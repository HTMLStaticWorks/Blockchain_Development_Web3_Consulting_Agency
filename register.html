<!DOCTYPE html>
<html lang="en" data-bs-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - NodeX Consulting</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css?v=2">
    <link rel="icon" href="assets/logo.svg" type="image/svg+xml">
    <script>
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
            document.documentElement.setAttribute('data-bs-theme', savedTheme);
        }
    </script>
    <style>
        /* Force hero text white in all themes */
        .hero-section h1, .hero-section h2, .hero-section p { color: #ffffff !important; }
        .hero-section h1 span:not(.text-gradient) { color: #ffffff !important; }
    </style>
</head>

<body class="d-flex align-items-center py-4 bg-body-tertiary" style="min-height: 100vh;">
    <main class="form-signin w-100 m-auto" style="max-width: 400px;">
        <div class="card p-4 shadow-sm text-center">
            <h1 class="h3 mb-3 fw-normal">Register</h1>
            <button class="btn btn-primary w-100 py-2">Submit</button>
        </div>
    </main>

    <!-- Back to Top Button -->
    <a href="#" id="backToTop" title="Back to top">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" class="bi bi-chevron-up"
            viewBox="0 0 16 16">
            <path fill-rule="evenodd"
                d="M7.646 4.646a.5.5 0 0 1 .708 0l6 6a.5.5 0 0 1-.708.708L8 5.707l-5.646 5.647a.5.5 0 0 1-.708-.708l6-6z" />
        </svg>
    </a>
</body>

</html>
