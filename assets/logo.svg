<svg xmlns="http://www.w3.org/2000/svg"
     width="512"
     height="512"
     viewBox="0 0 512 512">

    <defs>
        <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#4F8CFF"/>
            <stop offset="100%" stop-color="#6D3CFF"/>
        </linearGradient>
    </defs>

    <!-- Outer Hexagon -->
    <polygon
        points="256,60 410,150 410,362 256,452 102,362 102,150"
        fill="none"
        stroke="url(#grad)"
        stroke-width="22"
        stroke-linejoin="round"/>

    <!-- Network Nodes -->
    <circle cx="256" cy="120" r="14" fill="url(#grad)"/>
    <circle cx="355" cy="180" r="14" fill="url(#grad)"/>
    <circle cx="355" cy="332" r="14" fill="url(#grad)"/>
    <circle cx="256" cy="392" r="14" fill="url(#grad)"/>
    <circle cx="157" cy="332" r="14" fill="url(#grad)"/>
    <circle cx="157" cy="180" r="14" fill="url(#grad)"/>

    <!-- Connections -->
    <line x1="256" y1="120" x2="355" y2="180"
          stroke="url(#grad)" stroke-width="12" stroke-linecap="round"/>

    <line x1="355" y1="180" x2="355" y2="332"
          stroke="url(#grad)" stroke-width="12" stroke-linecap="round"/>

    <line x1="355" y1="332" x2="256" y2="392"
          stroke="url(#grad)" stroke-width="12" stroke-linecap="round"/>

    <line x1="256" y1="392" x2="157" y2="332"
          stroke="url(#grad)" stroke-width="12" stroke-linecap="round"/>

    <line x1="157" y1="332" x2="157" y2="180"
          stroke="url(#grad)" stroke-width="12" stroke-linecap="round"/>

    <line x1="157" y1="180" x2="256" y2="120"
          stroke="url(#grad)" stroke-width="12" stroke-linecap="round"/>

    <!-- Center Node -->
    <circle cx="256" cy="256" r="24" fill="url(#grad)"/>

    <!-- Inner Connections -->
    <line x1="256" y1="120" x2="256" y2="256"
          stroke="url(#grad)" stroke-width="10"/>

    <line x1="355" y1="180" x2="256" y2="256"
          stroke="url(#grad)" stroke-width="10"/>

    <line x1="355" y1="332" x2="256" y2="256"
          stroke="url(#grad)" stroke-width="10"/>

    <line x1="256" y1="392" x2="256" y2="256"
          stroke="url(#grad)" stroke-width="10"/>

    <line x1="157" y1="332" x2="256" y2="256"
          stroke="url(#grad)" stroke-width="10"/>

    <line x1="157" y1="180" x2="256" y2="256"
          stroke="url(#grad)" stroke-width="10"/>

</svg>
